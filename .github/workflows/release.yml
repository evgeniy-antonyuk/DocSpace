name: Release Action

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: true
        default: 'v3.1.7'
      source_docker_version:
        description: 'Source Docker version'
        required: true
        default: '3.1.7.XXXX'
      branch:
        description: 'Release branch'
        required: true
        default: 'release/v3.1.7'
      target_branch:
        description: 'Target branch'
        required: true
        default: 'master'

jobs:
  create_pr:
    name: Create PR for ${{ matrix.repo }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo: [ "DocSpace", "DocSpace-buildtools", "DocSpace-client", "DocSpace-server" ]
    steps:
      - name: Checkout repository ${{ matrix.repo }}
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/${{ matrix.repo }}
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0

      - name: Check branch existence
        run: |
          if ! git ls-remote --exit-code origin "${{ github.event.inputs.branch }}"; then
            echo "::warning::Branch '${{ github.event.inputs.branch }}' does not exist in repository ${{ matrix.repo }}"
            exit 1
          fi

      - name: Create Pull Request
        id: create_pr
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          if [ "$(git rev-list --count origin/${{ github.event.inputs.target_branch }}..origin/${{ github.event.inputs.branch }})" -eq 0 ]; then
            echo "::warning::No commits to merge in ${{ matrix.repo }}, skipping PR creation"
            echo "SKIP_PR=true" >> $GITHUB_ENV
          elif [[ -n "$(gh pr list --base ${{ github.event.inputs.target_branch }} --head ${{ github.event.inputs.branch }} --state open --json number --jq '.[0].number')" ]]; then
            echo "Pull request already exists in ${{ matrix.repo }}"
          else
            gh pr create -t "Merge ${{ github.event.inputs.branch }} into ${{ github.event.inputs.target_branch }}" -b '' \
              -B ${{ github.event.inputs.target_branch }} -H "${{ github.event.inputs.branch }}"
          fi

      - name: Auto merge Pull Request 
        if: steps.create_pr.outputs.SKIP_PR != 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          PR_NUMBER=$(timeout 60 bash -c 'while :; do PR_NUMBER=$(gh pr list --repo ${{ github.repository_owner }}/${{ matrix.repo }} --base ${{ github.event.inputs.target_branch }} --head "${{ github.event.inputs.branch }}" --state open --json number --jq ".[0].number"); [[ -n "$PR_NUMBER" && "$PR_NUMBER" != "UNKNOWN" ]] && echo $PR_NUMBER; sleep 2; exit 0; done;')
          if [ -n "${PR_NUMBER}" ]; then
            MERGEABLE_STATUS=$(gh pr view ${PR_NUMBER} --repo ${{ github.repository_owner }}/${{ matrix.repo }} --json mergeable --jq '.mergeable')
          else
            echo "::warning::Failed to get a PR number for ${{ matrix.repo }}"
          fi
          echo ${MERGEABLE_STATUS}
          if [ "${MERGEABLE_STATUS}" = "MERGEABLE" ]; then
            gh pr merge ${PR_NUMBER} --merge
          else
            echo "::warning::PR #$PR_NUMBER in ${{ matrix.repo }} is not mergeable or contains conflicts."
          fi

  release:
    name: Release ${{ matrix.repo }}
    runs-on: ubuntu-latest
    needs: create_pr
    strategy:
      fail-fast: false
      matrix:
        repo: [ "DocSpace", "DocSpace-buildtools", "DocSpace-client", "DocSpace-server" ]
    steps:
      - name: Wait for all PR merges across repositories
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          REPOS: "DocSpace DocSpace-client DocSpace-server DocSpace-buildtools"
        run: |
          echo "Waiting for PR merges in all repositories..."
          while :; do
            MERGED=0
            for REPO in ${REPOS}; do
              PR_INFO=$(gh pr list --repo ${{ github.repository_owner }}/${REPO} --base ${{ github.event.inputs.target_branch }} --head ${{ github.event.inputs.branch }} --state all --json state,url --jq '.[0] // {state: "NOT_FOUND", url: ""}')
              PR_STATE=$(echo "${PR_INFO}" | jq -r '.state') && PR_URL=$(echo "${PR_INFO}" | jq -r '.url')

              echo "PR state for $REPO: ${PR_STATE} ($PR_URL)"

              [ "${PR_STATE}" = "MERGED" ] && ((MERGED++))
              [ "${PR_STATE}" = "NOT_FOUND" ] && REPOS=$(echo "${REPOS}" | awk -v repo="${REPO}" '{for (i=1; i<=NF; i++) if ($i != repo) printf "%s ", $i; print ""}')
            done
            printf '%.0s-' {1..48}; echo
            [ "${MERGED}" -eq "$(echo ${REPOS} | wc -w)" ] && break
            sleep 5
          done

      - name: Checkout repository ${{ matrix.repo }}
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/${{ matrix.repo }}
          token: ${{ secrets.GH_TOKEN }}
          submodules: recursive
          fetch-depth: 0

      - name: Update submodules (DocSpace only)
        if: ${{ matrix.repo == 'DocSpace' }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git pull && git submodule update --remote --merge
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -am "Update submodules"
            git push origin HEAD
          else
            echo "::warning::No submodule changes detected."
          fi

      - name: Create Tag
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          TAG_NAME=${{ github.event.inputs.version }}$([ "${{ matrix.repo }}" != "DocSpace" ] && echo '-server' || echo '')
          git fetch --tags
          if git rev-parse "${TAG_NAME}" >/dev/null 2>&1; then
            echo "::warning::Tag ${TAG_NAME} already exists. Skipping tag creation."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag ${TAG_NAME}
            git push origin ${TAG_NAME}
          fi
        
      - name: Create Release (DocSpace only)
        if: ${{ matrix.repo == 'DocSpace' }}
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GH_TOKEN }}
          tag_name: ${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.version }}
          body: See changes at [CHANGELOG.md](${{ github.server_url }}/${{ github.repository }}/blob/master/CHANGELOG.md)
          draft: false
          prerelease: false

  trigger_docker_release:
    name: Trigger release Docker
    runs-on: ubuntu-latest
    steps:
      - name: Trigger release Docker
        run: |
          DOCKER_VERSION="${{ github.event.inputs.version }}"
          DOCKER_VERSION="${DOCKER_VERSION#v}.1"
          WORKFLOWS_JSON=$(curl -s "https://api.github.com/repos/${{ github.repository_owner }}/DocSpace-buildtools/actions/workflows")
          WORKFLOW_ID=$(echo "${WORKFLOWS_JSON}" | jq -r '.workflows[] | select(.path == ".github/workflows/release-docspace.yaml") | .id')

          curl -X POST "https://api.github.com/repos/${{ github.repository_owner }}/DocSpace-buildtools/actions/workflows/${WORKFLOW_ID}/dispatches" \
            -H "Accept: application/vnd.github.everest-preview+json" \
            -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
            --data "{\"ref\": \"${{ github.ref_name }}\", \"inputs\": {\"release_version\": \"${DOCKER_VERSION}\", \"source_version\": \"${{ github.event.inputs.source_docker_version }}\"}}"
